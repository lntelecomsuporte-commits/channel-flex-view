name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'resources/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env.production for self-hosted backend
        run: |
          cat > .env.production <<EOF
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID=local
          EOF
          echo "Backend target:"
          grep VITE_SUPABASE_URL .env.production

      - name: Set Android versionCode/versionName from run number
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          if [ -f android/app/build.gradle ]; then
            sed -i "s/versionCode [0-9]\+/versionCode $VERSION_CODE/" android/app/build.gradle
            sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle
            echo "Versão definida:"
            grep -E "versionCode|versionName" android/app/build.gradle
          fi

      - name: Build web (dist/)
        run: npm run build

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Capacitor sync
        run: npx cap sync android

      - name: Re-apply versionCode/versionName after cap sync
        run: |
          sed -i "s/versionCode [0-9]\+/versionCode ${VERSION_CODE}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME}\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Generate Android icons & splash from resources/
        run: |
          if [ -f resources/icon.png ]; then
            npm install --no-save @capacitor/assets
            npx @capacitor/assets generate --android --assetPath resources || echo "asset generation failed, continuing"
          else
            echo "No resources/icon.png found, skipping icon generation"
          fi

      - name: Decode release keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret missing — cannot sign release APK."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/lntv-release.keystore
          cat > android/keystore.properties <<EOF
          storeFile=app/lntv-release.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF
          echo "Keystore SHA256:"
          sha256sum android/app/lntv-release.keystore

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build Release APK (signed)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK + generate version.json
        run: |
          mkdir -p out
          APK_NAME="lntv-release-${{ github.run_number }}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "out/${APK_NAME}"
          cp "out/${APK_NAME}" out/lntv-latest.apk
          cat > out/version.json <<EOF
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "url": "https://tv2.lntelecom.net/downloads/lntv-latest.apk",
            "legacyUrl": "https://tv2.lntelecom.net/downloads/lntv-legacy.apk",
            "notes": "Build #${{ github.run_number }} — ${{ github.event.head_commit.message }}"
          }
          EOF
          cat out/version.json

      - name: Remove plugins incompatíveis com Android 5.x
        run: |
          # @capacitor/filesystem e @capacitor-community/file-opener exigem APIs SDK 23+
          # e crasham no boot em Android 5.x mesmo com tools:overrideLibrary
          # (porque o Capacitor registra os plugins nativos via reflection no startup).
          # Desinstalando, o auto-update do APK fica indisponível no legacy
          # (usuário baixa manualmente), mas o app abre normalmente.
          npm uninstall @capacitor/filesystem @capacitor-community/file-opener --legacy-peer-deps || true
          # Reset Android pra remover refs aos plugins removidos
          rm -rf android/app/src/main/assets/capacitor.plugins.json || true
          rm -rf android/capacitor-cordova-android-plugins || true

      - name: Build LEGACY APK (Android 5.0+ / minSdk 21)
        run: |
          sed -i "s/minSdkVersion = [0-9]\+/minSdkVersion = 21/" android/variables.gradle
          grep minSdkVersion android/variables.gradle
          npx cap sync android
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text()
          text = text.replace('android:name=".MainActivity"', 'android:name=".LegacyMainActivity"', 1)
          text = text.replace('android:theme="@style/AppTheme.NoActionBarLaunch"', 'android:theme="@style/AppTheme.LegacyLaunch"', 1)
          manifest.write_text(text)
          PY
          sed -i "s/versionCode [0-9]\+/versionCode ${VERSION_CODE}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME}\"/" android/app/build.gradle
          grep -E "LegacyMainActivity|AppTheme.LegacyLaunch" android/app/src/main/AndroidManifest.xml
          cd android && ./gradlew clean assembleRelease --no-daemon

      - name: Copy LEGACY APK to out/
        run: |
          LEGACY_NAME="lntv-legacy-${{ github.run_number }}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "out/${LEGACY_NAME}"
          cp "out/${LEGACY_NAME}" out/lntv-legacy.apk
          ls -lh out/

      - name: Cleanup keystore from runner
        if: always()
        run: |
          rm -f android/app/lntv-release.keystore android/keystore.properties

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lntv-release-apk
          path: |
            out/*.apk
            out/version.json
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: LN TV v${{ env.VERSION_NAME }} (build ${{ github.run_number }})
          body: |
            Build automático #${{ github.run_number }}
            Commit: ${{ github.event.head_commit.message }}

            APKs gerados:
            - **lntv-latest.apk** — Android 6.0+ (minSdk 23) — recomendado, com auto-update
            - **lntv-legacy.apk** — Android 5.0+ (minSdk 21) — TV boxes/dispositivos antigos

            versionCode: ${{ env.VERSION_CODE }}
            versionName: ${{ env.VERSION_NAME }}
          files: |
            out/lntv-latest.apk
            out/lntv-legacy.apk
            out/version.json
          make_latest: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
