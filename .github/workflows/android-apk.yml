name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'resources/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env.production for self-hosted backend
        run: |
          cat > .env.production <<EOF
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID=local
          EOF
          echo "Backend target:"
          grep VITE_SUPABASE_URL .env.production

      - name: Set Android versionCode/versionName from run number
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          # Atualiza android/app/build.gradle (já presente no repo)
          if [ -f android/app/build.gradle ]; then
            sed -i "s/versionCode [0-9]\+/versionCode $VERSION_CODE/" android/app/build.gradle
            sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle
            echo "Versão definida:"
            grep -E "versionCode|versionName" android/app/build.gradle
          fi

      - name: Build web (dist/)
        run: npm run build

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Capacitor sync
        run: npx cap sync android

      - name: Re-apply versionCode/versionName after cap sync
        run: |
          sed -i "s/versionCode [0-9]\+/versionCode ${VERSION_CODE}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME}\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Generate Android icons & splash from resources/
        run: |
          if [ -f resources/icon.png ]; then
            npm install --no-save @capacitor/assets
            npx @capacitor/assets generate --android --assetPath resources || echo "asset generation failed, continuing"
          else
            echo "No resources/icon.png found, skipping icon generation"
          fi

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK + generate version.json
        run: |
          mkdir -p out
          APK_NAME="lntv-debug-${{ github.run_number }}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "out/${APK_NAME}"
          # Cópia "latest" para URL estável usada pelo notificador
          cp "out/${APK_NAME}" out/lntv-latest.apk
          # version.json publicado junto ao APK em /downloads/ no nginx
          cat > out/version.json <<EOF
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "url": "https://tv2.lntelecom.net/downloads/lntv-latest.apk",
            "notes": "Build #${{ github.run_number }} — ${{ github.event.head_commit.message }}"
          }
          EOF
          cat out/version.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lntv-debug-apk
          path: |
            out/*.apk
            out/version.json
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: LN TV v${{ env.VERSION_NAME }} (build ${{ github.run_number }})
          body: |
            Build automático #${{ github.run_number }}
            Commit: ${{ github.event.head_commit.message }}

            APK: lntv-latest.apk
            versionCode: ${{ env.VERSION_CODE }}
            versionName: ${{ env.VERSION_NAME }}
          files: |
            out/lntv-latest.apk
            out/version.json
          make_latest: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
